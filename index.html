<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>巴士到達 - KMB / CTB（螢幕閱讀 / 標準）</title>

  <style>
    :root{
      --bg:#0b1220;
      --surface:#0f1a33;
      --surface2:#122044;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --muted2:#94a3b8;
      --primary:#60a5fa;
      --primary2:#3b82f6;
      --ok:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --border:rgba(148,163,184,.25);
      --focus:#fbbf24;
      --radius:16px;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --minTap:48px;
      --font: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      background: radial-gradient(1200px 800px at 30% 0%, #1e3a8a 0%, var(--bg) 60%);
      color:var(--text);
      line-height:1.55;
      -webkit-text-size-adjust: 100%;
    }

    .skip-link{
      position:absolute; left:-999px; top:0;
      background:#000; color:#fff;
      padding:.75rem 1rem; border-radius:10px;
      z-index:9999;
    }
    .skip-link:focus{ left:.75rem; top:.75rem; outline:3px solid var(--focus); }

    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:16px 12px 28px;
    }

    header{
      background: linear-gradient(135deg, rgba(96,165,250,.25), rgba(59,130,246,.12));
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px 16px;
      margin-top:10px;
    }
    header h1{ margin:0; font-size:1.35rem; letter-spacing:.2px; }
    header p{ margin:.35rem 0 0; color:var(--muted); font-size:.95rem; }

    main{
      margin-top:14px;
      background:rgba(15,26,51,.72);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      position:relative;
    }

    .group{ margin-bottom:14px; }
    label{ display:block; font-weight:1000; margin-bottom:8px; }

    input, select, button{ font: inherit; }

    .input, .select{
      width:100%;
      min-height: var(--minTap);
      padding:12px 12px;
      border-radius:14px;
      border:2px solid rgba(148,163,184,.25);
      background: rgba(18,32,68,.55);
      color:var(--text);
      outline:none;
    }

    .select{
      appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(203,213,225,.9) 50%),
        linear-gradient(135deg, rgba(203,213,225,.9) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:44px;
    }

    .input:focus, .select:focus, button:focus{
      outline:3px solid var(--focus);
      outline-offset:2px;
    }

    .hint{ margin-top:6px; color:var(--muted2); font-size:.9rem; }

    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    .row > *{ flex:1; min-width: 160px; }

    .btn{
      min-height: var(--minTap);
      border-radius:14px;
      border:2px solid rgba(148,163,184,.25);
      padding:10px 12px;
      background: rgba(18,32,68,.75);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.35), rgba(59,130,246,.25));
      border-color: rgba(96,165,250,.55);
    }
    .btn.warn{
      background: linear-gradient(135deg, rgba(251,191,36,.22), rgba(251,191,36,.10));
      border-color: rgba(251,191,36,.45);
    }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }

    .card{
      border:1px solid var(--border);
      border-radius: 14px;
      padding:12px;
      background: rgba(15,26,51,.75);
    }

    .dest{ font-size:1rem; font-weight:1000; color: var(--primary); }

    .statusBox{
      margin:10px 0 0;
      padding:12px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(15,26,51,.75);
    }
    .statusBox.success{ border-color: rgba(52,211,153,.5); }
    .statusBox.error{ border-color: rgba(251,113,133,.5); }
    .statusBox.info{ border-color: rgba(96,165,250,.5); }
    .statusTitle{ font-weight:1000; margin:0 0 4px; }
    .statusText{ margin:0; color:var(--muted); }

    .loading{
      display:none;
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(96,165,250,.4);
      background: rgba(15,26,51,.75);
    }
    .loading.show{ display:block; }

    .etaList{ margin-top:12px; display:none; }
    .etaItem{
      display:flex; flex-direction:column; gap:4px;
      padding:12px; border-radius:14px;
      border:1px solid var(--border);
      background: rgba(18,32,68,.55);
      margin-bottom:10px;
    }
    .etaTime{ font-size:1.2rem; font-weight:1000; color: var(--primary); }
    .etaCountdown{ color: var(--muted); font-weight:1000; }
    .etaRemark{ color: var(--muted2); font-size:.92rem; }

    .sr-only{
      position:absolute !important;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0);
      white-space:nowrap; border:0;
    }

    /* ===== Mode rules ===== */
    body.mode-sr .standard-only{ display:none !important; }
    body.mode-std .sr-only-ui{ display:none !important; }

    /* SR mode: visually quiet */
    body.mode-sr header p{ display:none; }
    body.mode-sr .hint{ display:none !important; }
    body.mode-sr .statusBox{ display:none !important; }

    /* Simple card */
    #simpleCard{ display:none; }
    #simpleMain{
      font-size:2.0rem;
      font-weight:1100;
      color:var(--primary);
      letter-spacing:.2px;
    }

    /* ===== Right-side control rail ===== */
    .rail{
      position:fixed;
      right: max(10px, env(safe-area-inset-right));
      top: 110px;
      z-index: 999;
      display:flex;
      flex-direction:column;
      gap:10px;
      width: 150px;
    }
    .rail .btn{
      width:150px;
      border-radius:16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    .railTitle{
      font-size:.9rem;
      color:var(--muted2);
      font-weight:1000;
      text-align:center;
      margin-bottom:4px;
    }

    @media (max-width: 640px){
      .rail{
        right: max(8px, env(safe-area-inset-right));
        top: auto;
        bottom: max(10px, env(safe-area-inset-bottom));
        width: 140px;
      }
      .rail .btn{ width:140px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ scroll-behavior:auto !important; transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body class="mode-sr">
  <a class="skip-link" href="#main">跳到主要內容</a>

  <div class="wrap">
    <header role="banner" aria-label="標題">
      <h1>🚌 巴士到達（KMB / CTB）</h1>
      <p class="standard-only">螢幕閱讀／標準</p>
    </header>

    <!-- Live regions -->
    <div id="srStatus" class="sr-only" role="status" aria-atomic="true"></div>
    <div id="srAlert" class="sr-only" role="alert" aria-atomic="true"></div>

    <main id="main" role="main" aria-label="巴士到站查詢">
      <!-- Mode toggle (standard mode only, minimal text) -->
      <section class="group standard-only" aria-label="模式">
        <button id="modeToggleTop" class="btn warn" aria-label="切換模式">模式：螢幕閱讀</button>
      </section>

      <section class="group" aria-label="路線">
        <label for="routeInput">路線</label>
        <input
          id="routeInput"
          class="input"
          list="routes"
          inputmode="text"
          autocomplete="off"
          placeholder="例如：1A / 101 / A21"
          aria-label="輸入路線"
        />
        <datalist id="routes"></datalist>
      </section>

      <section class="group" aria-label="目的地">
        <div class="card" id="destinationCard">
          <div class="dest" id="destinationText">請輸入路線</div>
        </div>

        <!-- In-content buttons (standard mode only) -->
        <div class="row standard-only" style="margin-top:10px;">
          <button id="toggleDirectionBtn" class="btn" disabled aria-label="切換方向">🔁 方向</button>
          <button id="toggleCompanyBtn" class="btn" disabled aria-label="切換公司">🏢 公司</button>
        </div>
      </section>

      <section class="group" aria-label="巴士站">
        <label for="stopSelect">巴士站</label>
        <select id="stopSelect" class="select" aria-label="選擇巴士站">
          <option value="">先揀路線</option>
        </select>
      </section>

      <!-- Visible status box only in standard mode -->
      <div id="statusBox" class="statusBox info standard-only" style="display:none;" aria-label="狀態">
        <p class="statusTitle" id="statusTitle">狀態</p>
        <p class="statusText" id="statusText"></p>
      </div>

      <div id="loadingBox" class="loading" aria-label="載入中" aria-busy="false">
        <strong>載入中…</strong>
      </div>

      <!-- Next bus card (shown in both modes) -->
      <section id="simpleCard" class="card" aria-label="最快一班" style="display:none;">
        <div style="font-weight:1100; font-size:1.05rem; margin-bottom:6px;">最快一班</div>
        <div id="simpleMain">—</div>
        <div id="simpleSub" class="hint standard-only" style="margin-top:6px;">—</div>
        <div class="row standard-only" style="margin-top:12px;">
          <button id="refreshEtaBtn" class="btn primary" aria-label="更新">🔄 更新</button>
        </div>
      </section>

      <!-- Full list (standard mode only) -->
      <section class="etaList standard-only" id="etaList" aria-label="完整到站時間" aria-live="off"></section>

      <section id="emptyState" class="card" aria-label="提示">
        <strong>輸入路線，再揀站。</strong>
      </section>
    </main>
  </div>

  <!-- Right rail -->
  <nav class="rail" aria-label="主要操作">
    <div class="railTitle">操作</div>

    <button id="modeToggleRail" class="btn warn" aria-label="切換模式">螢幕閱讀</button>

    <button id="railRefresh" class="btn primary" aria-label="更新">🔄 更新</button>

    <button id="railFocusStop" class="btn" aria-label="去揀站">📍 揀站</button>

    <button id="railFocusRoute" class="btn" aria-label="去輸入路線">🚌 路線</button>

    <button id="railToggleDir" class="btn" aria-label="切換方向" disabled>🔁 方向</button>

    <button id="railToggleCompany" class="btn" aria-label="切換公司" disabled>🏢 公司</button>
  </nav>

<script>
/* =========================
   Fast boot + local cache (TTL + SWR)
   - Cache: routes / stops / route-stops / stop detail
   - NEVER cache ETA
========================= */

const APP_NS = 'buseta_a11y_v8';
const NOW = () => Date.now();

const TTL = {
  KMB_ROUTES: 7 * 24 * 60 * 60 * 1000,
  KMB_STOPS: 30 * 24 * 60 * 60 * 1000,
  KMB_ROUTE_STOPS: 7 * 24 * 60 * 60 * 1000,
  KMB_STOP_DETAIL: 30 * 24 * 60 * 60 * 1000,
  CTB_ROUTES: 7 * 24 * 60 * 60 * 1000,
  CTB_ROUTE_STOPS: 7 * 24 * 60 * 60 * 1000,
  CTB_STOP_DETAIL: 30 * 24 * 60 * 60 * 1000
};

const REVALIDATE_AFTER = {
  ROUTES: 12 * 60 * 60 * 1000,
  STOPS: 24 * 60 * 60 * 1000,
  ROUTE_STOPS: 12 * 60 * 60 * 1000,
  STOP_DETAIL: 24 * 60 * 60 * 1000
};

const CANTO = {
  updating: '更新緊',
  updated: '已更新',
  noService: '冇班次',
  routeNotFound: '搵唔到路線',
  locationDenied: '定位用唔到',
  etaError: '更新失敗'
};

const el = (id) => document.getElementById(id);

// live regions
function announceStatus(msg){
  const node = el('srStatus');
  node.textContent = '';
  setTimeout(() => node.textContent = msg, 20);
}
function announceAlert(msg){
  const node = el('srAlert');
  node.textContent = '';
  setTimeout(() => node.textContent = msg, 20);
}

function showVisibleStatus(message, type='info', title='狀態'){
  const box = el('statusBox');
  if (!box) return;
  el('statusTitle').textContent = title;
  el('statusText').textContent = message;
  box.className = 'statusBox ' + type + ' standard-only';
  box.style.display = 'block';
  setTimeout(() => { box.style.display = 'none'; }, 3000);
}

function setLoading(show){
  const box = el('loadingBox');
  box.className = show ? 'loading show' : 'loading';
  box.setAttribute('aria-busy', show ? 'true' : 'false');
}

/* ===== Mode ===== */
const MODE_KEY = 'buseta_mode'; // 'sr' or 'std'
function getMode(){
  const m = localStorage.getItem(MODE_KEY);
  return (m === 'std' || m === 'sr') ? m : 'sr';
}
function setMode(mode){
  localStorage.setItem(MODE_KEY, mode);
  document.body.classList.toggle('mode-sr', mode === 'sr');
  document.body.classList.toggle('mode-std', mode === 'std');

  // minimal labels
  const rail = el('modeToggleRail');
  const top = el('modeToggleTop');
  if (mode === 'sr'){
    rail.textContent = '螢幕閱讀';
    if (top) top.textContent = '模式：螢幕閱讀';
    announceStatus('螢幕閱讀模式');
  }else{
    rail.textContent = '標準';
    if (top) top.textContent = '模式：標準';
    announceStatus('標準模式');
  }
}
function toggleMode(){
  setMode(getMode() === 'sr' ? 'std' : 'sr');
}

/* ===== Storage helpers (localStorage TTL) ===== */
const memStore = new Map();

function storageAvailable(){
  try{
    const k='__t__';
    localStorage.setItem(k,'1');
    localStorage.removeItem(k);
    return true;
  }catch(e){
    return false;
  }
}
const HAS_LS = storageAvailable();
function k(key){ return `${APP_NS}:${key}`; }

function safeSetItem(key, value){
  try{
    localStorage.setItem(key, value);
    return true;
  }catch(e){
    try{
      Object.keys(localStorage).forEach(kk => { if (kk.startsWith(APP_NS + ':')) localStorage.removeItem(kk); });
      localStorage.setItem(key, value);
      return true;
    }catch(e2){
      return false;
    }
  }
}

function cacheSet(key, data, ttlMs){
  const now = NOW();
  const item = { ver:APP_NS, ts:now, exp:now+ttlMs, data };
  const str = JSON.stringify(item);
  if (HAS_LS) safeSetItem(k(key), str);
  else memStore.set(k(key), str);
}

function cacheGet(key){
  const raw = HAS_LS ? localStorage.getItem(k(key)) : memStore.get(k(key));
  if (!raw) return { hit:false };
  try{
    const item = JSON.parse(raw);
    if (!item || item.ver !== APP_NS) return { hit:false };
    const now = NOW();
    return { hit:true, expired: now > item.exp, ts:item.ts, data:item.data };
  }catch(e){
    return { hit:false };
  }
}

async function fetchJSON(url, init){
  const r = await fetch(url, init);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// stale-while-revalidate
async function cacheFetchJSON(key, url, ttlMs, revalidateAfterMs, init){
  const c = cacheGet(key);

  if (c.hit && !c.expired){
    const age = NOW() - (c.ts || 0);
    if (age > revalidateAfterMs){
      (async () => {
        try{
          const fresh = await fetchJSON(url, init);
          cacheSet(key, fresh, ttlMs);
        }catch(_){}
      })();
    }
    return c.data;
  }

  if (c.hit && c.expired){
    (async () => {
      try{
        const fresh = await fetchJSON(url, init);
        cacheSet(key, fresh, ttlMs);
      }catch(_){}
    })();
    return c.data;
  }

  const fresh = await fetchJSON(url, init);
  cacheSet(key, fresh, ttlMs);
  return fresh;
}

// small concurrency limiter
async function mapLimit(arr, limit, worker){
  const ret = [];
  let i = 0;
  const runners = new Array(Math.min(limit, arr.length)).fill(0).map(async () => {
    while(i < arr.length){
      const idx = i++;
      ret[idx] = await worker(arr[idx], idx);
    }
  });
  await Promise.all(runners);
  return ret;
}

/* ===== Helpers ===== */
function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function speakCountdown(min, sec){
  if (min <= 0 && sec > 0) return `仲有${sec}秒到`;
  if (min > 0 && sec > 0) return `仲有${min}分${sec}秒到`;
  if (min > 0) return `仲有${min}分鐘到`;
  return '就到';
}

function pickNextBus(validEtas){
  let best = null;
  let bestSec = Infinity;
  for (const it of validEtas){
    if (!it.eta) continue;
    const etaD = new Date(it.eta);
    const nowD = new Date(it.data_timestamp || Date.now());
    const diffSec = Math.floor((etaD - nowD) / 1000);
    if (diffSec >= 0 && diffSec < bestSec){
      bestSec = diffSec;
      best = { it, diffSec };
    }
  }
  return best;
}

function getCurrentLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('定位不可用'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
      (_) => reject(new Error(CANTO.locationDenied)),
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
    );
  });
}

/* ===== Providers ===== */
const KMB = {
  base: 'https://data.etabus.gov.hk/v1/transport/kmb',
  async fetchStopsMap() {
    return cacheFetchJSON(
      'kmb:stopsMap',
      `${this.base}/stop/`,
      TTL.KMB_STOPS,
      REVALIDATE_AFTER.STOPS
    ).then(j => j.data.reduce((m, i) => { m[i.stop] = i.name_tc; return m; }, {}));
  },
  async fetchRoutes() {
    const j = await cacheFetchJSON(
      'kmb:routes',
      `${this.base}/route/`,
      TTL.KMB_ROUTES,
      REVALIDATE_AFTER.ROUTES
    );
    return j.data;
  },
  async fetchRouteStops(route, direction) {
    const key = `kmb:routeStops:${route}:${direction}`;
    const j = await cacheFetchJSON(
      key,
      `${this.base}/route-stop/${route}/${direction}/1`,
      TTL.KMB_ROUTE_STOPS,
      REVALIDATE_AFTER.ROUTE_STOPS
    );
    return j.data || [];
  },
  async fetchStopDetail(stopId) {
    const key = `kmb:stopDetail:${stopId}`;
    const j = await cacheFetchJSON(
      key,
      `${this.base}/stop/${stopId}`,
      TTL.KMB_STOP_DETAIL,
      REVALIDATE_AFTER.STOP_DETAIL
    );
    const d = j.data || {};
    return { stop: stopId, name_tc: d.name_tc, lat: parseFloat(d.lat), long: parseFloat(d.long) };
  },
  async fetchEta(stopId, route) {
    const r = await fetch(`${this.base}/eta/${stopId}/${route}/1`, { cache:'no-store' });
    const j = await r.json();
    return j.data || [];
  }
};

const CTB = {
  base: 'https://rt.data.gov.hk/v2/transport/citybus',
  companyId: 'CTB',
  _stopCacheMem: new Map(),
  async fetchRoutes() {
    const j = await cacheFetchJSON(
      'ctb:routes',
      `${this.base}/route/${this.companyId}`,
      TTL.CTB_ROUTES,
      REVALIDATE_AFTER.ROUTES
    );
    const data = j.data;
    if (Array.isArray(data)) return data;
    if (data && typeof data === 'object') return [data];
    return [];
  },
  async fetchRouteStops(route, direction) {
    const key = `ctb:routeStops:${route}:${direction}`;
    const j = await cacheFetchJSON(
      key,
      `${this.base}/route-stop/${this.companyId}/${route}/${direction}`,
      TTL.CTB_ROUTE_STOPS,
      REVALIDATE_AFTER.ROUTE_STOPS
    );
    return j.data || [];
  },
  async fetchStopDetail(stopId) {
    if (this._stopCacheMem.has(stopId)) return this._stopCacheMem.get(stopId);
    const key = `ctb:stopDetail:${stopId}`;
    const j = await cacheFetchJSON(
      key,
      `${this.base}/stop/${stopId}`,
      TTL.CTB_STOP_DETAIL,
      REVALIDATE_AFTER.STOP_DETAIL
    );
    const d = j.data || {};
    const detail = { stop: stopId, name_tc: d.name_tc, lat: parseFloat(d.lat), long: parseFloat(d.long) };
    this._stopCacheMem.set(stopId, detail);
    return detail;
  },
  async fetchEta(stopId, route) {
    const r = await fetch(`${this.base}/eta/${this.companyId}/${stopId}/${route}`, { cache:'no-store' });
    const j = await r.json();
    return j.data || [];
  }
};

/* ===== App state ===== */
let kmbStopsMap = {};
let kmbRoutesData = [];
let ctbRoutesData = [];
let kmbRoutesSet = new Set();
let ctbRoutesSet = new Set();
let ctbRouteMap = new Map();
let currentDirection = 'outbound';
let companyMode = 'AUTO';
let resolvedCompany = null;

function companyLabel(mode){
  if (mode === 'AUTO') return '自動';
  if (mode === 'KMB') return 'KMB';
  if (mode === 'CTB') return '城巴';
  return mode;
}

function resolveCompanyForRoute(route){
  const inKMB = kmbRoutesSet.has(route);
  const inCTB = ctbRoutesSet.has(route);
  if (!inKMB && !inCTB) return null;
  if (companyMode === 'KMB' && inKMB) return 'KMB';
  if (companyMode === 'CTB' && inCTB) return 'CTB';
  if (inKMB && !inCTB) return 'KMB';
  if (inCTB && !inKMB) return 'CTB';
  if (companyMode === 'CTB') return 'CTB';
  return 'KMB';
}

function updateButtons(route){
  const inBtn = el('toggleCompanyBtn');
  const railBtn = el('railToggleCompany');
  const text = `🏢 ${companyLabel(companyMode)}`;
  inBtn.textContent = `🏢 公司：${companyLabel(companyMode)}`;
  railBtn.textContent = text;

  const disabled = !route;
  inBtn.disabled = disabled;
  railBtn.disabled = disabled;
}

function updateDirectionButtons(enabled){
  el('toggleDirectionBtn').disabled = !enabled;
  el('railToggleDir').disabled = !enabled;
}

function updateDestination(route){
  const dest = el('destinationText');
  if (!route || !resolvedCompany){
    dest.textContent = '請輸入路線';
    updateDirectionButtons(false);
    return;
  }

  if (resolvedCompany === 'KMB'){
    const rows = kmbRoutesData.filter(i => String(i.route).toUpperCase() === route);
    const currentInfo = rows.find(i => i.bound === (currentDirection === 'outbound' ? 'O' : 'I')) || rows[0];
    if (currentInfo){
      dest.textContent = `🎯 ${currentInfo.dest_tc}`;
      updateDirectionButtons(true);
    }else{
      dest.textContent = '請輸入路線';
      updateDirectionButtons(false);
    }
    return;
  }

  if (resolvedCompany === 'CTB'){
    const info = ctbRouteMap.get(route);
    if (info){
      const text = (currentDirection === 'outbound')
        ? (info.dest_tc || info.dest_en || route)
        : (info.orig_tc || info.orig_en || route);
      dest.textContent = `🎯 ${text}`;
      updateDirectionButtons(true);
    }else{
      dest.textContent = '請輸入路線';
      updateDirectionButtons(false);
    }
    return;
  }
}

// auto nearest stop
async function autoFindClosestStop(route){
  const stopSelect = el('stopSelect');
  if (!route || !resolvedCompany) return;
  if (!stopSelect.options || stopSelect.options.length <= 1) return;

  try{
    announceStatus(CANTO.updating);
    const userLocation = await getCurrentLocation();

    let stopsWithCoords = [];
    if (resolvedCompany === 'KMB'){
      const routeStops = await KMB.fetchRouteStops(route, currentDirection);
      const ps = routeStops.map(st => KMB.fetchStopDetail(st.stop).then(d => ({...st, ...d})));
      stopsWithCoords = await Promise.all(ps);
    }else{
      const routeStops = await CTB.fetchRouteStops(route, currentDirection);
      const ps = routeStops.map(st => CTB.fetchStopDetail(st.stop).then(d => ({...st, ...d})));
      stopsWithCoords = await Promise.all(ps);
    }

    let closestStop = null;
    let minDistance = Infinity;

    stopsWithCoords.forEach(stop => {
      if (Number.isFinite(stop.lat) && Number.isFinite(stop.long)){
        const distance = calculateDistance(userLocation.latitude, userLocation.longitude, stop.lat, stop.long);
        if (distance < minDistance){
          minDistance = distance;
          closestStop = stop;
        }
      }
    });

    if (closestStop){
      stopSelect.value = closestStop.stop;
      stopSelect.dispatchEvent(new Event('change'));
    }
  }catch(_){
    // silent
  }
}

/* ===== Start ===== */
document.addEventListener('DOMContentLoaded', async () => {
  // init mode
  setMode(getMode());

  // mode toggles
  el('modeToggleRail').addEventListener('click', toggleMode);
  const topToggle = el('modeToggleTop');
  if (topToggle) topToggle.addEventListener('click', toggleMode);

  const routeInput = el('routeInput');
  const stopSelect = el('stopSelect');
  const routesDatalist = el('routes');
  const etaList = el('etaList');
  const simpleCard = el('simpleCard');

  // rail actions
  el('railFocusRoute').addEventListener('click', () => routeInput.focus());
  el('railFocusStop').addEventListener('click', () => stopSelect.focus());
  el('railRefresh').addEventListener('click', () => stopSelect.dispatchEvent(new Event('change')));

  // in-card refresh
  const refreshBtn = el('refreshEtaBtn');
  if (refreshBtn) refreshBtn.addEventListener('click', () => stopSelect.dispatchEvent(new Event('change')));

  // keep uppercase
  routeInput.addEventListener('input', (e) => {
    const v = e.target.value.toUpperCase();
    if (v !== e.target.value) e.target.value = v;
  });

  // toggle dir (both)
  function toggleDir(){
    if (!routeInput.value) return;
    currentDirection = currentDirection === 'outbound' ? 'inbound' : 'outbound';
    updateDestination(routeInput.value.toUpperCase());
    updateRouteAndStops();
  }
  el('toggleDirectionBtn').addEventListener('click', toggleDir);
  el('railToggleDir').addEventListener('click', toggleDir);

  // toggle company (both)
  function toggleCompany(){
    companyMode = (companyMode === 'AUTO') ? 'KMB' : (companyMode === 'KMB') ? 'CTB' : 'AUTO';
    const route = routeInput.value.toUpperCase();
    updateButtons(route);

    if (!route) return;
    resolvedCompany = resolveCompanyForRoute(route);
    if (!resolvedCompany){
      announceAlert(CANTO.routeNotFound);
      return;
    }
    updateDestination(route);
    updateRouteAndStops();
  }
  el('toggleCompanyBtn').addEventListener('click', toggleCompany);
  el('railToggleCompany').addEventListener('click', toggleCompany);

  // load routes/stops (cached)
  try{
    setLoading(true);
    announceStatus(CANTO.updating);

    const [kmbStops, kmbRoutes, ctbRoutes] = await Promise.all([
      KMB.fetchStopsMap(),
      KMB.fetchRoutes(),
      CTB.fetchRoutes()
    ]);

    kmbStopsMap = kmbStops;
    kmbRoutesData = kmbRoutes;
    ctbRoutesData = ctbRoutes;

    kmbRoutesSet = new Set(kmbRoutesData.map(x => String(x.route).toUpperCase()));
    ctbRoutesSet = new Set(ctbRoutesData.map(x => String(x.route).toUpperCase()));
    ctbRouteMap = new Map(ctbRoutesData.map(x => [String(x.route).toUpperCase(), x]));

    routesDatalist.innerHTML = '';
    const union = Array.from(new Set([...kmbRoutesSet, ...ctbRoutesSet]))
      .sort((a,b) => a.localeCompare(b, undefined, {numeric:true, sensitivity:'base'}));
    union.forEach(rt => {
      const o = document.createElement('option');
      o.value = rt;
      routesDatalist.appendChild(o);
    });

    announceStatus(CANTO.updated);
  }catch(e){
    announceAlert(CANTO.etaError);
  }finally{
    setLoading(false);
  }

  // route change
  routeInput.addEventListener('change', () => {
    const route = routeInput.value.toUpperCase();
    routeInput.value = route;

    resolvedCompany = resolveCompanyForRoute(route);
    updateButtons(route);

    if (!resolvedCompany){
      updateDestination('');
      stopSelect.innerHTML = '<option value="">先揀路線</option>';
      if (etaList){ etaList.style.display='none'; etaList.innerHTML=''; }
      simpleCard.style.display = 'none';
      el('emptyState').style.display = 'block';
      announceAlert(CANTO.routeNotFound);
      return;
    }

    currentDirection = 'outbound';
    updateDestination(route);
    updateRouteAndStops();
  });

  async function updateRouteAndStops(){
    const route = routeInput.value.toUpperCase();
    if (!route || !resolvedCompany) return;

    setLoading(true);
    announceStatus(CANTO.updating);
    showVisibleStatus('更新緊…','info');

    el('emptyState').style.display = 'none';
    if (etaList){ etaList.style.display='none'; etaList.innerHTML=''; }
    simpleCard.style.display = 'none';
    stopSelect.innerHTML = '';

    try{
      if (resolvedCompany === 'KMB'){
        const sd = await KMB.fetchRouteStops(route, currentDirection);
        sd.sort((a,b)=>Number(a.seq)-Number(b.seq)).forEach(it => {
          const opt = document.createElement('option');
          opt.value = it.stop;
          opt.textContent = `${it.seq}. ${kmbStopsMap[it.stop] || it.stop}`;
          opt.dataset.seq = String(it.seq);
          stopSelect.appendChild(opt);
        });
      }else{
        const sd = await CTB.fetchRouteStops(route, currentDirection);

        sd.sort((a,b)=>Number(a.seq)-Number(b.seq)).forEach(it => {
          const opt = document.createElement('option');
          opt.value = it.stop;
          opt.textContent = `${it.seq}. ${it.stop}`;
          opt.dataset.seq = String(it.seq);
          stopSelect.appendChild(opt);
        });

        const ids = sd.map(x => x.stop);
        mapLimit(ids, 6, async (id) => {
          try{
            const det = await CTB.fetchStopDetail(id);
            for (const opt of stopSelect.options){
              if (opt.value === id){
                const seq = opt.dataset.seq || '';
                const name = det && det.name_tc ? det.name_tc : id;
                opt.textContent = `${seq}. ${name}`;
                break;
              }
            }
          }catch(_){}
        });
      }

      announceStatus(CANTO.updated);
      showVisibleStatus('已更新','success');
      autoFindClosestStop(route);
    }catch(e){
      announceAlert(CANTO.etaError);
      showVisibleStatus('失敗','error');
    }finally{
      setLoading(false);
    }
  }

  // stop change -> ETA (no cache)
  stopSelect.addEventListener('change', async () => {
    const route = routeInput.value.toUpperCase();
    const stopId = stopSelect.value;

    if (!stopId || !route || !resolvedCompany){
      if (etaList) etaList.style.display='none';
      simpleCard.style.display='none';
      el('emptyState').style.display='block';
      return;
    }

    setLoading(true);
    announceStatus(CANTO.updating);
    showVisibleStatus('更新緊…','info');

    el('emptyState').style.display='none';
    if (etaList){ etaList.innerHTML=''; etaList.style.display='none'; }
    simpleCard.style.display='none';

    try{
      const selectedSeq = Number(stopSelect.options[stopSelect.selectedIndex].dataset.seq || '0');

      let validEtas = [];
      if (resolvedCompany === 'KMB'){
        const ed = await KMB.fetchEta(stopId, route);
        validEtas = ed.filter(it => Number(it.seq) === selectedSeq);
      }else{
        const ed = await CTB.fetchEta(stopId, route);
        const dirLetter = currentDirection === 'outbound' ? 'O' : 'I';
        validEtas = ed.filter(it => Number(it.seq) === selectedSeq && String(it.dir).toUpperCase() === dirLetter);
      }

      const simpleMain = el('simpleMain');
      const simpleSub = el('simpleSub');

      if (!validEtas || validEtas.length === 0){
        simpleMain.textContent = '暫無資料';
        if (simpleSub) simpleSub.textContent = '';
        simpleCard.style.display='block';
        announceStatus('暫無資料');
        return;
      }

      const next = pickNextBus(validEtas);
      if (!next){
        simpleMain.textContent = CANTO.noService;
        if (simpleSub) simpleSub.textContent = '';
        simpleCard.style.display='block';
        announceStatus(CANTO.noService);
        return;
      }

      const diffSec = next.diffSec;
      const min = Math.floor(diffSec / 60);
      const sec = diffSec % 60;

      const bigText = (min <= 0) ? `仲有 ${sec} 秒` : `仲有 ${min} 分 ${sec} 秒`;

      const etaD = new Date(next.it.eta);
      const hr = etaD.getHours();
      const mm = String(etaD.getMinutes()).padStart(2,'0');
      const rmk = next.it.rmk_tc || next.it.rmk_en || '';

      simpleMain.textContent = bigText;
      if (simpleSub) simpleSub.textContent = (rmk ? `預計 ${hr}:${mm}｜${rmk}` : `預計 ${hr}:${mm}`);
      simpleCard.style.display='block';

      announceStatus(`${CANTO.updated}。最快：${speakCountdown(min, sec)}`);

      // standard mode: show list (limited)
      if (getMode() === 'std' && etaList){
        const items = validEtas.slice(0, 6);
        items.forEach((it) => {
          const eta = it.eta ? new Date(it.eta) : null;
          const nowD = new Date(it.data_timestamp || Date.now());
          let cd = '';
          if (eta){
            const ds = Math.floor((eta - nowD)/1000);
            const m = Math.floor(ds/60);
            const s = Math.abs(ds%60);
            if (m >= 0) cd = `${m}分${String(s).padStart(2,'0')}秒`;
          }
          const hr2 = eta ? eta.getHours() : '';
          const mm2 = eta ? String(eta.getMinutes()).padStart(2,'0') : '';
          const rmk2 = it.rmk_tc || it.rmk_en || '';

          const div = document.createElement('div');
          div.className = 'etaItem';
          div.innerHTML = `
            <div class="etaTime">${eta ? `${hr2}:${mm2}` : CANTO.noService}</div>
            <div class="etaCountdown">${cd ? `距離 ${cd}` : ''}</div>
            <div class="etaRemark">${rmk2}</div>
          `;
          etaList.appendChild(div);
        });
        etaList.style.display='block';
      }

      showVisibleStatus('已更新','success');
    }catch(e){
      announceAlert(CANTO.etaError);
      showVisibleStatus('失敗','error');
    }finally{
      setLoading(false);
    }
  });
});
</script>
