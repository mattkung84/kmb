<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>巴士到達（KMB / CTB）</title>
  <style>
    :root{
      --bg:#0b1220;
      --surface:#0f1a33;
      --surface2:#122044;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --muted2:#94a3b8;
      --primary:#60a5fa;
      --border:rgba(148,163,184,.25);
      --focus:#fbbf24;
      --radius:16px;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --minTap:48px;
      --font: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      --railSpace: 0px; /* reserve space for mobile dock */
    }
    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      background: radial-gradient(1200px 800px at 30% 0%, #1e3a8a 0%, var(--bg) 60%);
      color:var(--text);
      line-height:1.55;
      -webkit-text-size-adjust: 100%;
    }

    .skip-link{
      position:absolute; left:-999px; top:0;
      background:#000; color:#fff;
      padding:.65rem .9rem; border-radius:10px;
      z-index:9999;
    }
    .skip-link:focus{ left:.75rem; top:.75rem; outline:3px solid var(--focus); }

    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:12px 12px calc(22px + var(--railSpace));
    }

    /* ===== Compact Header (1 line) ===== */
    header{
      background: linear-gradient(135deg, rgba(96,165,250,.20), rgba(59,130,246,.10));
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:10px 12px;          /* ✅ smaller */
      margin-top:6px;             /* ✅ smaller */
    }
    .headerRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    header h1{
      margin:0;
      font-size:1.08rem;          /* ✅ smaller */
      letter-spacing:.1px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      font-weight:1200;
    }
    .headerSub{
      color:var(--muted2);
      font-weight:900;
      font-size:.82rem;           /* ✅ small sub text */
      margin-left:6px;
    }
    .modeBadge{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.25);
      background: rgba(18,32,68,.55);
      color:var(--muted);
      font-weight:1100;
      font-size:.85rem;           /* ✅ small */
      white-space:nowrap;
    }

    main{
      margin-top:10px;            /* ✅ smaller than before */
      background:rgba(15,26,51,.72);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      position:relative;
    }

    .group{ margin-bottom:14px; }
    label{ display:block; font-weight:1100; margin-bottom:8px; }
    input, select, button{ font: inherit; }

    .input, .select{
      width:100%;
      min-height: var(--minTap);
      padding:12px 12px;
      border-radius:14px;
      border:2px solid rgba(148,163,184,.25);
      background: rgba(18,32,68,.55);
      color:var(--text);
      outline:none;
    }
    .select{
      appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(203,213,225,.9) 50%),
        linear-gradient(135deg, rgba(203,213,225,.9) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:44px;
    }
    .input:focus, .select:focus, button:focus{
      outline:3px solid var(--focus);
      outline-offset:2px;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    .row > *{
      flex: 1 1 160px;
      min-width: 0; /* ✅ prevent flex overflow */
    }

    .btn{
      min-height: var(--minTap);
      border-radius:14px;
      border:2px solid rgba(148,163,184,.25);
      padding:10px 12px;
      background: rgba(18,32,68,.75);
      color:var(--text);
      font-weight:1100;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.35), rgba(59,130,246,.25));
      border-color: rgba(96,165,250,.55);
    }
    .btn.warn{
      background: linear-gradient(135deg, rgba(251,191,36,.22), rgba(251,191,36,.10));
      border-color: rgba(251,191,36,.45);
    }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }

    .card{
      border:1px solid var(--border);
      border-radius: 14px;
      padding:12px;
      background: rgba(15,26,51,.75);
    }
    .dest{ font-size:1rem; font-weight:1100; color: var(--primary); }

    .loading{
      display:none;
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(96,165,250,.4);
      background: rgba(15,26,51,.75);
    }
    .loading.show{ display:block; }
    .loading small{ color:var(--muted2); }

    /* ===== Next buses card ===== */
    #etaCard{ display:none; }
    .etaTitle{ font-weight:1200; font-size:1.05rem; margin-bottom:8px; }
    .etaGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    .etaLine{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background: rgba(18,32,68,.55);
    }
    .etaLineTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      margin-bottom:4px;
    }
    .etaLabel{
      font-weight:1100;
      color:var(--muted2);
      font-size:.9rem;
    }
    .etaBig{
      font-size:2.0rem;
      font-weight:1300;
      color:var(--primary);
      line-height:1.08;
    }

    /* ===== Standard: extra buses compact row (Option A) ===== */
    .extraRow{
      margin-top:10px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 10px;
      background: rgba(18,32,68,.40);
      color:var(--muted);
      font-size:.92rem;
      line-height:1.25;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .extraItem{ white-space:nowrap; }

    /* ===== Live regions ===== */
    .sr-only{
      position:absolute !important;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0);
      white-space:nowrap; border:0;
    }

    /* ===== Mode rules ===== */
    body.mode-sr .standard-only{ display:none !important; }
    body.mode-std .sr-only-ui{ display:none !important; }

    /* ===== Right-side control rail (desktop/tablet) ===== */
    .rail{
      position:fixed;
      right: max(10px, env(safe-area-inset-right));
      top: 98px;
      z-index: 999;
      display:flex;
      flex-direction:column;
      gap:10px;
      width: 150px;
    }
    .rail .btn{
      width:150px;
      border-radius:16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    .railTitle{
      font-size:.9rem;
      color:var(--muted2);
      font-weight:1100;
      text-align:center;
      margin-bottom:4px;
    }

    /* ✅ Mobile: convert rail into bottom dock (3 columns) */
    @media (max-width: 640px){
      :root{
        --railSpace: calc(140px + env(safe-area-inset-bottom, 0px));
      }

      .rail{
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;

        width: auto;
        margin: 0 auto;

        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;

        padding:
          10px
          max(10px, env(safe-area-inset-right, 0px))
          calc(10px + env(safe-area-inset-bottom, 0px))
          max(10px, env(safe-area-inset-left, 0px));

        background: rgba(15,26,51,.92);
        border-top: 1px solid var(--border);
        backdrop-filter: blur(10px);
        z-index: 999;
      }

      .railTitle{ display:none; }

      .rail .btn{
        width: auto;
        min-height: 44px;
        padding: 10px 8px;
        border-radius: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* slightly smaller basis on very small phones */
      .row > *{ flex-basis: 140px; }
    }

    /* ===== Details modal ===== */
    .modalBackdrop{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      z-index:2000;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)) 10px;
    }
    .modal{
      max-width:560px;
      margin:0 auto;
      background:rgba(15,26,51,.95);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      max-height: 92vh;
    }
    .modalHeader{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--border);
      gap:10px;
    }
    .modalTitle{
      flex: 1 1 auto;
      min-width: 0;
      font-weight:1200;
      white-space:nowrap;
      word-break:keep-all;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.25;
    }
    .modalClose{
      border:none;
      background:transparent;
      color:var(--text);
      font-size:1.2rem;
      cursor:pointer;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.25);
    }
    .modalBody{
      padding:14px;
      overflow:auto;
    }
    .modalItem{
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      background: rgba(18,32,68,.55);
      margin-bottom:10px;
    }
    .modalRow{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      line-height:1.4;
    }
    .modalTime{
      font-weight:1200;
      color:var(--primary);
      white-space:nowrap;
    }
    .modalCd{
      font-weight:1100;
      white-space:nowrap;
    }
    .modalRm{
      margin-top:6px;
      color:var(--muted2);
      font-size:.9rem;
      line-height:1.6;
      word-break:break-word;
    }
  </style>
</head>

<body class="mode-sr">
  <a class="skip-link" href="#main">跳到主要內容</a>

  <div class="wrap">
    <header role="banner" aria-label="標題">
      <div class="headerRow">
        <h1 aria-label="巴士到達">
          🚌 巴士到達 <span class="headerSub">(KMB/CTB)</span>
        </h1>
        <div id="modeBadge" class="modeBadge" aria-label="目前模式">螢幕閱讀</div>
      </div>
    </header>

    <!-- Live regions -->
    <div id="srStatus" class="sr-only" role="status" aria-atomic="true"></div>
    <div id="srAlert" class="sr-only" role="alert" aria-atomic="true"></div>

    <main id="main" role="main" aria-label="巴士到站查詢">
      <section class="group standard-only" aria-label="模式">
        <button id="modeToggleTop" class="btn warn" aria-label="切換模式">模式：螢幕閱讀</button>
      </section>

      <section class="group" aria-label="路線">
        <label for="routeInput">路線</label>
        <input id="routeInput" class="input" list="routes" inputmode="text" autocomplete="off"
               placeholder="例如：1A / 101 / A21" aria-label="輸入路線" />
        <datalist id="routes"></datalist>
      </section>

      <section class="group" aria-label="目的地">
        <div class="card">
          <div class="dest" id="destinationText">請輸入路線</div>
        </div>
        <div class="row standard-only" style="margin-top:10px;">
          <button id="toggleDirectionBtn" class="btn" disabled aria-label="切換方向">🔁 方向</button>
          <button id="toggleCompanyBtn" class="btn" disabled aria-label="切換公司">🏢 公司</button>
        </div>
      </section>

      <section class="group" aria-label="巴士站">
        <label for="stopSelect">巴士站</label>
        <select id="stopSelect" class="select" aria-label="選擇巴士站">
          <option value="">先揀路線</option>
        </select>
      </section>

      <div id="loadingBox" class="loading" aria-label="載入中" aria-busy="false">
        <strong>載入中…</strong>
        <div class="standard-only"><small>（資料更新中）</small></div>
      </div>

      <!-- Main ETA card -->
      <section id="etaCard" class="card" aria-label="到站時間">
        <div class="etaTitle">到站時間</div>
        <div class="etaGrid" id="etaGrid"></div>

        <!-- Standard extra row -->
        <div id="extraRow" class="extraRow standard-only" style="display:none;"></div>

        <div class="row" style="margin-top:12px;">
          <button id="refreshBtn" class="btn primary" aria-label="更新">🔄 更新</button>
          <button id="detailsBtn" class="btn" aria-label="詳情">📄 詳情</button>
        </div>
      </section>

      <section id="emptyState" class="card" aria-label="提示">
        <strong>輸入路線，再揀站。</strong>
      </section>
    </main>
  </div>

  <!-- Right rail / Mobile dock -->
  <nav class="rail" aria-label="主要操作">
    <div class="railTitle">操作</div>
    <button id="modeToggleRail" class="btn warn" aria-label="切換模式">螢幕閱讀</button>
    <button id="railRefresh" class="btn primary" aria-label="更新">🔄 更新</button>
    <button id="railFocusStop" class="btn" aria-label="去揀站">📍 揀站</button>
    <button id="railFocusRoute" class="btn" aria-label="去輸入路線">🚌 路線</button>
    <button id="railToggleDir" class="btn" aria-label="切換方向" disabled>🔁 方向</button>
    <button id="railToggleCompany" class="btn" aria-label="切換公司" disabled>🏢 公司</button>
  </nav>

  <!-- Details modal -->
  <div id="modalBackdrop" class="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="到站詳情">
      <div class="modalHeader">
        <div class="modalTitle">到站詳情</div>
        <button id="closeModalBtn" class="modalClose" aria-label="關閉">✕</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <script>
    /* =========================
       Cache + mode + API
    ========================= */
    const APP_NS = 'buseta_final_full_v1';
    const NOW = () => Date.now();
    const TTL = {
      KMB_ROUTES: 7 * 24 * 60 * 60 * 1000,
      KMB_STOPS: 30 * 24 * 60 * 60 * 1000,
      KMB_ROUTE_STOPS: 7 * 24 * 60 * 60 * 1000,
      KMB_STOP_DETAIL: 30 * 24 * 60 * 60 * 1000,
      CTB_ROUTES: 7 * 24 * 60 * 60 * 1000,
      CTB_ROUTE_STOPS: 7 * 24 * 60 * 60 * 1000,
      CTB_STOP_DETAIL: 30 * 24 * 60 * 60 * 1000
    };
    const REVALIDATE_AFTER = {
      ROUTES: 12 * 60 * 60 * 1000,
      STOPS: 24 * 60 * 60 * 1000,
      ROUTE_STOPS: 12 * 60 * 60 * 1000,
      STOP_DETAIL: 24 * 60 * 60 * 1000
    };

    // spoken (SR) announcements: short
    const SAY = {
      updating: '更新緊',
      updated: '已更新',
      none: '冇班次',
      routeNotFound: '搵唔到路線',
      locNo: '定位用唔到',
      fail: '更新失敗'
    };

    const el = (id) => document.getElementById(id);

    // live regions
    function announceStatus(msg){
      const node = el('srStatus');
      node.textContent = '';
      setTimeout(() => node.textContent = msg, 20);
    }
    function announceAlert(msg){
      const node = el('srAlert');
      node.textContent = '';
      setTimeout(() => node.textContent = msg, 20);
    }

    function setLoading(show){
      const box = el('loadingBox');
      box.className = show ? 'loading show' : 'loading';
      box.setAttribute('aria-busy', show ? 'true' : 'false');
    }

    /* ===== Mode ===== */
    const MODE_KEY = 'buseta_mode'; // 'sr' or 'std'
    function getMode(){
      const m = localStorage.getItem(MODE_KEY);
      return (m === 'std' || m === 'sr') ? m : 'sr';
    }
    function setMode(mode){
      localStorage.setItem(MODE_KEY, mode);
      document.body.classList.toggle('mode-sr', mode === 'sr');
      document.body.classList.toggle('mode-std', mode === 'std');

      const rail = el('modeToggleRail');
      const top = el('modeToggleTop');
      const badge = el('modeBadge');

      if (mode === 'sr'){
        rail.textContent = '螢幕閱讀';
        if (top) top.textContent = '模式：螢幕閱讀';
        if (badge) badge.textContent = '螢幕閱讀';
        announceStatus('螢幕閱讀');
      }else{
        rail.textContent = '標準';
        if (top) top.textContent = '模式：標準';
        if (badge) badge.textContent = '標準';
        announceStatus('標準');
      }
    }
    function toggleMode(){ setMode(getMode() === 'sr' ? 'std' : 'sr'); }

    /* ===== Storage (TTL localStorage) ===== */
    const memStore = new Map();
    function storageAvailable(){
      try{
        const k='__t__';
        localStorage.setItem(k,'1');
        localStorage.removeItem(k);
        return true;
      }catch(e){ return false; }
    }
    const HAS_LS = storageAvailable();
    function keyName(key){ return `${APP_NS}:${key}`; }

    function safeSetItem(key, value){
      try{
        localStorage.setItem(key, value);
        return true;
      }catch(e){
        try{
          Object.keys(localStorage).forEach(kk => { if (kk.startsWith(APP_NS + ':')) localStorage.removeItem(kk); });
          localStorage.setItem(key, value);
          return true;
        }catch(_){ return false; }
      }
    }
    function cacheSet(key, data, ttlMs){
      const now = NOW();
      const item = { ver:APP_NS, ts:now, exp:now+ttlMs, data };
      const str = JSON.stringify(item);
      if (HAS_LS) safeSetItem(keyName(key), str);
      else memStore.set(keyName(key), str);
    }
    function cacheGet(key){
      const raw = HAS_LS ? localStorage.getItem(keyName(key)) : memStore.get(keyName(key));
      if (!raw) return { hit:false };
      try{
        const item = JSON.parse(raw);
        if (!item || item.ver !== APP_NS) return { hit:false };
        const now = NOW();
        return { hit:true, expired: now > item.exp, ts:item.ts, data:item.data };
      }catch(e){
        return { hit:false };
      }
    }

    async function fetchJSON(url, init){
      const r = await fetch(url, init);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    async function cacheFetchJSON(key, url, ttlMs, revalidateAfterMs, init){
      const c = cacheGet(key);
      if (c.hit && !c.expired){
        const age = NOW() - (c.ts || 0);
        if (age > revalidateAfterMs){
          (async () => {
            try{
              const fresh = await fetchJSON(url, init);
              cacheSet(key, fresh, ttlMs);
            }catch(_){}
          })();
        }
        return c.data;
      }
      if (c.hit && c.expired){
        (async () => {
          try{
            const fresh = await fetchJSON(url, init);
            cacheSet(key, fresh, ttlMs);
          }catch(_){}
        })();
        return c.data;
      }
      const fresh = await fetchJSON(url, init);
      cacheSet(key, fresh, ttlMs);
      return fresh;
    }

    async function mapLimit(arr, limit, worker){
      const ret = [];
      let i = 0;
      const runners = new Array(Math.min(limit, arr.length)).fill(0).map(async () => {
        while(i < arr.length){
          const idx = i++;
          ret[idx] = await worker(arr[idx], idx);
        }
      });
      await Promise.all(runners);
      return ret;
    }

    /* ===== Helpers ===== */
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }
    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error(SAY.locNo));
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
          (_) => reject(new Error(SAY.locNo)),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
        );
      });
    }

    function parseEtaSeconds(etaIso, dataTsIso){
      if (!etaIso) return null;
      const etaD = new Date(etaIso);
      const nowD = new Date(dataTsIso || Date.now());
      return Math.floor((etaD - nowD) / 1000);
    }
    function formatClock(etaIso){
      if (!etaIso) return '';
      const d = new Date(etaIso);
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }
    function sortEtas(arr){
      return arr.slice().sort((a,b)=>{
        const ta = a.eta ? new Date(a.eta).getTime() : Infinity;
        const tb = b.eta ? new Date(b.eta).getTime() : Infinity;
        return ta - tb;
      });
    }

    // Standard compact formatting (written Chinese)
    function cdWritten(sec){
      if (sec == null || sec < 0) return '';
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (m <= 0) return `${s}秒`;
      return `${m}分${s ? (String(s).padStart(2,'0')+'秒') : ''}`;
    }
    // SR spoken formatting (Cantonese)
    function cdSpoken(sec){
      if (sec == null || sec < 0) return SAY.none;
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (m <= 0) return `仲有${s}秒到`;
      if (s) return `仲有${m}分${s}秒到`;
      return `仲有${m}分鐘到`;
    }
    // Extra buses in standard: minutes only to save space
    function cdExtraCompact(sec){
      if (sec == null || sec < 0) return '';
      if (sec < 60) return `${sec}秒`;
      const m = Math.floor(sec / 60);
      return `${m}分`;
    }

    /* ===== Providers ===== */
    const KMB = {
      base: 'https://data.etabus.gov.hk/v1/transport/kmb',
      async fetchStopsMap() {
        return cacheFetchJSON(
          'kmb:stopsMap',
          `${this.base}/stop/`,
          TTL.KMB_STOPS,
          REVALIDATE_AFTER.STOPS
        ).then(j => j.data.reduce((m, i) => { m[i.stop] = i.name_tc; return m; }, {}));
      },
      async fetchRoutes() {
        const j = await cacheFetchJSON(
          'kmb:routes',
          `${this.base}/route/`,
          TTL.KMB_ROUTES,
          REVALIDATE_AFTER.ROUTES
        );
        return j.data;
      },
      async fetchRouteStops(route, direction) {
        const key = `kmb:routeStops:${route}:${direction}`;
        const j = await cacheFetchJSON(
          key,
          `${this.base}/route-stop/${route}/${direction}/1`,
          TTL.KMB_ROUTE_STOPS,
          REVALIDATE_AFTER.ROUTE_STOPS
        );
        return j.data || [];
      },
      async fetchStopDetail(stopId) {
        const key = `kmb:stopDetail:${stopId}`;
        const j = await cacheFetchJSON(
          key,
          `${this.base}/stop/${stopId}`,
          TTL.KMB_STOP_DETAIL,
          REVALIDATE_AFTER.STOP_DETAIL
        );
        const d = j.data || {};
        return { stop: stopId, name_tc: d.name_tc, lat: parseFloat(d.lat), long: parseFloat(d.long) };
      },
      async fetchEta(stopId, route) {
        const r = await fetch(`${this.base}/eta/${stopId}/${route}/1`, { cache:'no-store' });
        const j = await r.json();
        return j.data || [];
      }
    };

    const CTB = {
      base: 'https://rt.data.gov.hk/v2/transport/citybus',
      companyId: 'CTB',
      _stopCacheMem: new Map(),
      async fetchRoutes() {
        const j = await cacheFetchJSON(
          'ctb:routes',
          `${this.base}/route/${this.companyId}`,
          TTL.CTB_ROUTES,
          REVALIDATE_AFTER.ROUTES
        );
        const data = j.data;
        if (Array.isArray(data)) return data;
        if (data && typeof data === 'object') return [data];
        return [];
      },
      async fetchRouteStops(route, direction) {
        const key = `ctb:routeStops:${route}:${direction}`;
        const j = await cacheFetchJSON(
          key,
          `${this.base}/route-stop/${this.companyId}/${route}/${direction}`,
          TTL.CTB_ROUTE_STOPS,
          REVALIDATE_AFTER.ROUTE_STOPS
        );
        return j.data || [];
      },
      async fetchStopDetail(stopId) {
        if (this._stopCacheMem.has(stopId)) return this._stopCacheMem.get(stopId);
        const key = `ctb:stopDetail:${stopId}`;
        const j = await cacheFetchJSON(
          key,
          `${this.base}/stop/${stopId}`,
          TTL.CTB_STOP_DETAIL,
          REVALIDATE_AFTER.STOP_DETAIL
        );
        const d = j.data || {};
        const detail = { stop: stopId, name_tc: d.name_tc, lat: parseFloat(d.lat), long: parseFloat(d.long) };
        this._stopCacheMem.set(stopId, detail);
        return detail;
      },
      async fetchEta(stopId, route) {
        const r = await fetch(`${this.base}/eta/${this.companyId}/${stopId}/${route}`, { cache:'no-store' });
        const j = await r.json();
        return j.data || [];
      }
    };

    /* ===== App state ===== */
    let kmbStopsMap = {};
    let kmbRoutesData = [];
    let ctbRoutesData = [];
    let kmbRoutesSet = new Set();
    let ctbRoutesSet = new Set();
    let ctbRouteMap = new Map();

    let currentDirection = 'outbound';
    let companyMode = 'AUTO';
    let resolvedCompany = null;

    let lastEtasSorted = []; // for modal details

    function companyLabel(mode){
      if (mode === 'AUTO') return '自動';
      if (mode === 'KMB') return 'KMB';
      if (mode === 'CTB') return '城巴';
      return mode;
    }

    function resolveCompanyForRoute(route){
      const inK = kmbRoutesSet.has(route);
      const inC = ctbRoutesSet.has(route);
      if (!inK && !inC) return null;
      if (companyMode === 'KMB' && inK) return 'KMB';
      if (companyMode === 'CTB' && inC) return 'CTB';
      if (inK && !inC) return 'KMB';
      if (inC && !inK) return 'CTB';
      if (companyMode === 'CTB') return 'CTB';
      return 'KMB';
    }

    function updateCompanyButtons(route){
      const inBtn = el('toggleCompanyBtn');
      const railBtn = el('railToggleCompany');
      inBtn.textContent = `🏢 公司：${companyLabel(companyMode)}`;
      railBtn.textContent = `🏢 ${companyLabel(companyMode)}`;
      const disabled = !route;
      inBtn.disabled = disabled;
      railBtn.disabled = disabled;
    }

    function updateDirectionButtons(enabled){
      el('toggleDirectionBtn').disabled = !enabled;
      el('railToggleDir').disabled = !enabled;
    }

    function updateDestination(route){
      const dest = el('destinationText');
      if (!route || !resolvedCompany){
        dest.textContent = '請輸入路線';
        updateDirectionButtons(false);
        return;
      }

      if (resolvedCompany === 'KMB'){
        const rows = kmbRoutesData.filter(i => String(i.route).toUpperCase() === route);
        const bound = (currentDirection === 'outbound') ? 'O' : 'I';
        const info = rows.find(r => r.bound === bound) || rows[0];
        if (info){
          dest.textContent = `🎯 ${info.dest_tc}`;
          updateDirectionButtons(true);
        }else{
          dest.textContent = '請輸入路線';
          updateDirectionButtons(false);
        }
        return;
      }

      if (resolvedCompany === 'CTB'){
        const info = ctbRouteMap.get(route);
        if (info){
          const text = (currentDirection === 'outbound')
            ? (info.dest_tc || info.dest_en || route)
            : (info.orig_tc || info.orig_en || route);
          dest.textContent = `🎯 ${text}`;
          updateDirectionButtons(true);
        }else{
          dest.textContent = '請輸入路線';
          updateDirectionButtons(false);
        }
        return;
      }
    }

    /* ===== Render ===== */
    function renderCardTwoLines(sorted){
      const grid = el('etaGrid');
      grid.innerHTML = '';
      const mode = getMode();
      const limit = 2;
      const items = sorted.slice(0, limit);

      if (!items.length){
        grid.innerHTML = `<div class="etaLine"><div class="etaLabel">最快</div><div class="etaBig">${SAY.none}</div></div>`;
        return;
      }

      items.forEach((it, idx)=>{
        const sec = parseEtaSeconds(it.eta, it.data_timestamp);
        const label = (idx === 0) ? '最快' : '下一班';
        const big = (mode === 'sr') ? cdSpoken(sec) : (`⏱ ${cdWritten(sec) || ''}`.trim() || SAY.none);

        const div = document.createElement('div');
        div.className = 'etaLine';
        div.innerHTML = `
          <div class="etaLineTop">
            <div class="etaLabel">${label}</div>
            <div></div>
          </div>
          <div class="etaBig">${big}</div>
        `;
        grid.appendChild(div);
      });

      if (mode === 'sr'){
        const s1 = items[0] ? cdSpoken(parseEtaSeconds(items[0].eta, items[0].data_timestamp)) : SAY.none;
        const s2 = items[1] ? cdSpoken(parseEtaSeconds(items[1].eta, items[1].data_timestamp)) : '';
        announceStatus(`${SAY.updated}。${s1}${s2 ? '。下一班，' + s2 : ''}`);
      }
    }

    function renderExtraRowStandard(sorted){
      const row = el('extraRow');
      row.innerHTML = '';
      if (getMode() !== 'std'){
        row.style.display = 'none';
        return;
      }
      const extra = sorted.slice(2);
      if (!extra.length){
        row.style.display = 'none';
        return;
      }
      extra.forEach(it=>{
        const sec = parseEtaSeconds(it.eta, it.data_timestamp);
        const cd = cdExtraCompact(sec);
        if (!cd) return;
        const span = document.createElement('span');
        span.className = 'extraItem';
        span.textContent = `⏱ ${cd}`;
        row.appendChild(span);
      });
      row.style.display = row.childElementCount ? 'flex' : 'none';
    }

    function openDetails(){
      const bd = el('modalBody');
      bd.innerHTML = '';
      const list = lastEtasSorted || [];
      if (!list.length){
        bd.innerHTML = `<div style="color:var(--muted2);">暫無資料</div>`;
      }else{
        list.forEach((it, idx)=>{
          const sec = parseEtaSeconds(it.eta, it.data_timestamp);
          const clock = formatClock(it.eta) || SAY.none;
          const cd = cdWritten(sec);
          const rm = it.rmk_tc || it.rmk_en || '';
          const div = document.createElement('div');
          div.className = 'modalItem';
          div.innerHTML = `
            <div class="modalRow">
              <div class="modalTime">${idx+1}. ${clock}</div>
              <div class="modalCd">${cd ? `⏱ ${cd}` : ''}</div>
            </div>
            <div class="modalRm">${rm}</div>
          `;
          bd.appendChild(div);
        });
      }
      el('modalBackdrop').style.display = 'block';
      el('modalBackdrop').setAttribute('aria-hidden','false');
    }
    function closeDetails(){
      el('modalBackdrop').style.display = 'none';
      el('modalBackdrop').setAttribute('aria-hidden','true');
    }

    async function autoFindClosestStop(route){
      const stopSelect = el('stopSelect');
      if (!route || !resolvedCompany) return;
      if (!stopSelect.options || stopSelect.options.length <= 1) return;

      try{
        const userLocation = await getCurrentLocation();
        let stops = [];
        if (resolvedCompany === 'KMB'){
          const rs = await KMB.fetchRouteStops(route, currentDirection);
          const details = await mapLimit(rs, 8, async (st) => {
            const d = await KMB.fetchStopDetail(st.stop);
            return {...st, ...d};
          });
          stops = details;
        }else{
          const rs = await CTB.fetchRouteStops(route, currentDirection);
          const details = await mapLimit(rs, 8, async (st) => {
            const d = await CTB.fetchStopDetail(st.stop);
            return {...st, ...d};
          });
          stops = details;
        }

        let closestStop = null;
        let minDistance = Infinity;
        stops.forEach(stop => {
          if (Number.isFinite(stop.lat) && Number.isFinite(stop.long)){
            const distance = calculateDistance(userLocation.latitude, userLocation.longitude, stop.lat, stop.long);
            if (distance < minDistance){
              minDistance = distance;
              closestStop = stop;
            }
          }
        });

        if (closestStop){
          stopSelect.value = closestStop.stop;
          stopSelect.dispatchEvent(new Event('change'));
        }
      }catch(_){
        // silent
      }
    }

    /* ===== Start ===== */
    document.addEventListener('DOMContentLoaded', async () => {
      setMode(getMode());

      el('modeToggleRail').addEventListener('click', toggleMode);
      const top = el('modeToggleTop');
      if (top) top.addEventListener('click', toggleMode);

      el('detailsBtn').addEventListener('click', openDetails);
      el('closeModalBtn').addEventListener('click', closeDetails);
      el('modalBackdrop').addEventListener('click', (e) => {
        if (e.target === el('modalBackdrop')) closeDetails();
      });

      const routeInput = el('routeInput');
      const stopSelect = el('stopSelect');
      const routesDatalist = el('routes');

      el('railFocusRoute').addEventListener('click', () => routeInput.focus());
      el('railFocusStop').addEventListener('click', () => stopSelect.focus());
      el('railRefresh').addEventListener('click', () => stopSelect.dispatchEvent(new Event('change')));
      el('refreshBtn').addEventListener('click', () => stopSelect.dispatchEvent(new Event('change')));

      routeInput.addEventListener('input', (e) => {
        const v = e.target.value.toUpperCase();
        if (v !== e.target.value) e.target.value = v;
      });

      function toggleDir(){
        if (!routeInput.value) return;
        currentDirection = currentDirection === 'outbound' ? 'inbound' : 'outbound';
        updateDestination(routeInput.value.toUpperCase());
        updateRouteAndStops();
      }
      el('toggleDirectionBtn').addEventListener('click', toggleDir);
      el('railToggleDir').addEventListener('click', toggleDir);

      function toggleCompany(){
        companyMode = (companyMode === 'AUTO') ? 'KMB' : (companyMode === 'KMB') ? 'CTB' : 'AUTO';
        const route = routeInput.value.toUpperCase();
        updateCompanyButtons(route);
        if (!route) return;
        resolvedCompany = resolveCompanyForRoute(route);
        if (!resolvedCompany){
          announceAlert(SAY.routeNotFound);
          return;
        }
        updateDestination(route);
        updateRouteAndStops();
      }
      el('toggleCompanyBtn').addEventListener('click', toggleCompany);
      el('railToggleCompany').addEventListener('click', toggleCompany);

      try{
        setLoading(true);
        announceStatus(SAY.updating);

        const [kmbStops, kmbRoutes, ctbRoutes] = await Promise.all([
          KMB.fetchStopsMap(),
          KMB.fetchRoutes(),
          CTB.fetchRoutes()
        ]);

        kmbStopsMap = kmbStops;
        kmbRoutesData = kmbRoutes;
        ctbRoutesData = ctbRoutes;

        kmbRoutesSet = new Set(kmbRoutesData.map(x => String(x.route).toUpperCase()));
        ctbRoutesSet = new Set(ctbRoutesData.map(x => String(x.route).toUpperCase()));
        ctbRouteMap = new Map(ctbRoutesData.map(x => [String(x.route).toUpperCase(), x]));

        routesDatalist.innerHTML = '';
        const union = Array.from(new Set([...kmbRoutesSet, ...ctbRoutesSet]))
          .sort((a,b) => a.localeCompare(b, undefined, {numeric:true, sensitivity:'base'}));

        union.forEach(rt => {
          const o = document.createElement('option');
          o.value = rt;
          routesDatalist.appendChild(o);
        });

        announceStatus(SAY.updated);
      }catch(_){
        announceAlert(SAY.fail);
      }finally{
        setLoading(false);
      }

      routeInput.addEventListener('change', () => {
        const route = routeInput.value.toUpperCase();
        routeInput.value = route;

        resolvedCompany = resolveCompanyForRoute(route);
        updateCompanyButtons(route);

        if (!resolvedCompany){
          updateDestination('');
          stopSelect.innerHTML = '<option value="">先揀路線</option>';
          el('etaCard').style.display = 'none';
          el('emptyState').style.display = 'block';
          announceAlert(SAY.routeNotFound);
          return;
        }

        currentDirection = 'outbound';
        updateDestination(route);
        updateRouteAndStops();
      });

      async function updateRouteAndStops(){
        const route = routeInput.value.toUpperCase();
        if (!route || !resolvedCompany) return;

        setLoading(true);
        announceStatus(SAY.updating);
        el('emptyState').style.display = 'none';
        el('etaCard').style.display = 'none';
        stopSelect.innerHTML = '';

        try{
          if (resolvedCompany === 'KMB'){
            const sd = await KMB.fetchRouteStops(route, currentDirection);
            sd.sort((a,b)=>Number(a.seq)-Number(b.seq)).forEach(it => {
              const opt = document.createElement('option');
              opt.value = it.stop;
              opt.textContent = `${it.seq}. ${kmbStopsMap[it.stop] || it.stop}`;
              opt.dataset.seq = String(it.seq);
              stopSelect.appendChild(opt);
            });
          }else{
            const sd = await CTB.fetchRouteStops(route, currentDirection);
            sd.sort((a,b)=>Number(a.seq)-Number(b.seq)).forEach(it => {
              const opt = document.createElement('option');
              opt.value = it.stop;
              opt.textContent = `${it.seq}. ${it.stop}`;
              opt.dataset.seq = String(it.seq);
              stopSelect.appendChild(opt);
            });

            const ids = sd.map(x => x.stop);
            mapLimit(ids, 6, async (id) => {
              try{
                const det = await CTB.fetchStopDetail(id);
                for (const opt of stopSelect.options){
                  if (opt.value === id){
                    const seq = opt.dataset.seq || '';
                    const name = det && det.name_tc ? det.name_tc : id;
                    opt.textContent = `${seq}. ${name}`;
                    break;
                  }
                }
              }catch(_){}
            });
          }

          announceStatus(SAY.updated);
          autoFindClosestStop(route);
        }catch(_){
          announceAlert(SAY.fail);
        }finally{
          setLoading(false);
        }
      }

      stopSelect.addEventListener('change', async () => {
        const route = routeInput.value.toUpperCase();
        const stopId = stopSelect.value;

        if (!stopId || !route || !resolvedCompany){
          el('etaCard').style.display='none';
          el('emptyState').style.display='block';
          return;
        }

        setLoading(true);
        announceStatus(SAY.updating);
        el('emptyState').style.display='none';

        try{
          const selectedSeq = Number(stopSelect.options[stopSelect.selectedIndex].dataset.seq || '0');
          let validEtas = [];

          if (resolvedCompany === 'KMB'){
            const ed = await KMB.fetchEta(stopId, route);
            validEtas = ed.filter(it => Number(it.seq) === selectedSeq);
          }else{
            const ed = await CTB.fetchEta(stopId, route);
            const dirLetter = currentDirection === 'outbound' ? 'O' : 'I';
            validEtas = ed.filter(it => Number(it.seq) === selectedSeq && String(it.dir).toUpperCase() === dirLetter);
          }

          const sorted = sortEtas(validEtas);
          lastEtasSorted = sorted;

          el('etaCard').style.display = 'block';
          renderCardTwoLines(sorted);
          renderExtraRowStandard(sorted);

          announceStatus(SAY.updated);
        }catch(_){
          announceAlert(SAY.fail);
        }finally{
          setLoading(false);
        }
      });
    });
  </script>
</body>
</html>
